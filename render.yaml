# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect repo: https://github.com/VimalMishra-Myanatomy/Hiring-Agent---AI-Resume-Evaluator

services:
  # FastAPI backend
  - type: web
    name: hiring-agent-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: LLM_PROVIDER
        value: gemini
      - key: DEFAULT_MODEL
        value: gemini-3.1-flash-lite
      # Optional server-side fallback key (users can also bring their own in the UI)
      - key: GEMINI_API_KEY
        sync: false
      # Set after first deploy, e.g. https://hiring-agent-ui.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false

  # React static frontend
  - type: web
    name: hiring-agent-ui
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: hiring-agent-api
          envVarKey: RENDER_EXTERNAL_URL
